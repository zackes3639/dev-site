<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | Zack Simon</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
  <style>
    .admin-wrapper {
      max-width: 780px;
      margin: 0 auto;
      padding: clamp(32px, 5vw, 64px) clamp(16px, 3.2vw, 32px);
    }
    .admin-eyebrow {
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6c3fd4;
      margin-bottom: 6px;
    }
    .admin-title {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700;
      color: #0b1220;
      margin: 0 0 32px;
    }
    .admin-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: clamp(24px, 4vw, 40px);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    /* ── Login ── */
    .admin-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 20px;
    }
    .admin-label {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #94a3b8;
    }
    .admin-input {
      width: 100%;
      height: 44px;
      padding: 0 14px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #0b1220;
      background: #fafafa;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .admin-input:focus { outline: none; border-color: #6c3fd4; background: #fff; }
    .admin-textarea {
      width: 100%;
      min-height: 200px;
      padding: 12px 14px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #0b1220;
      background: #fafafa;
      box-sizing: border-box;
      resize: vertical;
      line-height: 1.6;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .admin-textarea:focus { outline: none; border-color: #6c3fd4; background: #fff; }
    .admin-toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .admin-toggle-row input[type="checkbox"] {
      width: 18px; height: 18px;
      accent-color: #6c3fd4;
      cursor: pointer; flex-shrink: 0;
    }
    .admin-toggle-label { font-size: 0.9rem; color: #475569; cursor: pointer; }
    .admin-divider { border: none; border-top: 1px solid #f1f5f9; margin: 0 0 24px; }
    .admin-btn {
      height: 44px;
      padding: 0 20px;
      border: 1px solid #6c3fd4;
      border-radius: 8px;
      background: #ffffff;
      color: #0b1220;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      box-shadow: 0 4px 12px rgba(108,63,212,0.10);
    }
    .admin-btn:hover { background: #f6f2ff; }
    .admin-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .admin-btn-full { width: 100%; height: 48px; font-size: 0.95rem; }
    .admin-btn-danger {
      border-color: #e53935;
      color: #e53935;
      box-shadow: none;
    }
    .admin-btn-danger:hover { background: #fff5f5; }
    .admin-msg {
      display: none;
      margin-top: 16px;
      font-size: 0.875rem;
      text-align: center;
    }

    /* ── Post list ── */
    .admin-list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .admin-list-title {
      font-size: 1rem;
      font-weight: 700;
      color: #0b1220;
      margin: 0;
    }
    .admin-post-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .admin-post-row:last-child { border-bottom: none; }
    .admin-post-info { flex: 1; min-width: 0; }
    .admin-post-row-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #0b1220;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .admin-post-meta {
      font-size: 0.78rem;
      color: #94a3b8;
      margin-top: 2px;
    }
    .admin-post-badge {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      border-radius: 99px;
      flex-shrink: 0;
    }
    .badge-published { background: #dcfce7; color: #15803d; }
    .badge-draft     { background: #f1f5f9; color: #64748b; }
    .admin-row-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .admin-empty { color: #94a3b8; font-size: 0.9rem; padding: 24px 0; text-align: center; }

    /* ── Form header ── */
    .admin-form-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .admin-back-btn {
      background: none;
      border: none;
      color: #6c3fd4;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
    }
    .admin-back-btn:hover { text-decoration: underline; }
    .admin-form-title {
      font-size: 1rem;
      font-weight: 700;
      color: #0b1220;
      margin: 0;
    }

    /* ── Hub ── */
    .admin-hub {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    @media (max-width: 480px) { .admin-hub { grid-template-columns: 1fr; } }
    .admin-hub-card {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 28px 22px;
      cursor: pointer;
      transition: border-color 0.18s, box-shadow 0.18s;
      text-align: left;
      background: none;
      width: 100%;
      box-sizing: border-box;
    }
    .admin-hub-card:hover {
      border-color: #6c3fd4;
      box-shadow: 0 4px 18px rgba(108,63,212,0.10);
    }
    .admin-hub-card-label {
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6c3fd4;
      margin: 0 0 8px;
    }
    .admin-hub-card-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #0b1220;
      margin: 0 0 5px;
    }
    .admin-hub-card-desc {
      font-size: 0.82rem;
      color: #64748b;
      margin: 0;
    }

    /* ── Extra badges for builds ── */
    .badge-live { background: #dcfce7; color: #15803d; }
    .badge-wip  { background: #fef3c7; color: #d97706; }
    .badge-idea { background: #f1f5f9; color: #64748b; }

    /* ── Views ── */
    #view-login, #view-hub, #view-list, #view-form,
    #view-builds-list, #view-builds-form { display: none; }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="nav-left">
      <a class="logo" href="/" aria-label="Go to home page">
        <img src="/assets/images/logo.svg" alt="Zack Simon logo" class="logo-image" />
      </a>
    </div>
    <div class="hotbar" role="navigation" aria-label="Primary navigation">
      <a class="hot-btn" href="/">About Me</a>
      <a class="hot-btn" href="/work/">Builds</a>
      <a class="hot-btn hot-btn-active" href="/blog/">The Build Log</a>
      <a class="hot-btn" href="/contact/">Contact</a>
    </div>
    <div class="nav-contact"></div>
  </header>

  <main>
    <div class="admin-wrapper">
      <p class="admin-eyebrow">Admin</p>
      <h1 class="admin-title" id="admin-page-title">Sign In</h1>

      <div class="admin-card">

        <!-- HUB VIEW -->
        <div id="view-hub">
          <div class="admin-hub">
            <button class="admin-hub-card" id="hub-builds-btn">
              <p class="admin-hub-card-label">Kanban</p>
              <h2 class="admin-hub-card-title">Builds</h2>
              <p class="admin-hub-card-desc">Add, edit, and move cards on the board</p>
            </button>
            <button class="admin-hub-card" id="hub-blog-btn">
              <p class="admin-hub-card-label">Blog</p>
              <h2 class="admin-hub-card-title">The Build Log</h2>
              <p class="admin-hub-card-desc">Write, edit, and publish posts</p>
            </button>
          </div>
        </div>

        <!-- LOGIN VIEW -->
        <div id="view-login">
          <div class="admin-field">
            <label class="admin-label" for="admin-password">Admin Password</label>
            <input type="password" id="admin-password" class="admin-input" placeholder="Enter password" autocomplete="current-password" />
          </div>
          <button id="login-btn" class="admin-btn admin-btn-full">Sign In</button>
          <p class="admin-msg" id="login-msg"></p>
        </div>

        <!-- LIST VIEW -->
        <div id="view-list">
          <div class="admin-form-header" style="margin-bottom:20px">
            <button class="admin-back-btn" id="blog-back-to-hub-btn">← Admin</button>
            <p class="admin-form-title">The Build Log</p>
          </div>
          <div class="admin-list-header">
            <p class="admin-list-title" id="list-count">Posts</p>
            <button class="admin-btn" id="new-post-btn">+ New Post</button>
          </div>
          <div id="post-list-body"></div>
          <p class="admin-msg" id="list-msg"></p>
        </div>

        <!-- FORM VIEW -->
        <div id="view-form">
          <div class="admin-form-header">
            <button class="admin-back-btn" id="back-btn">← Back</button>
            <p class="admin-form-title" id="form-mode-title">New Post</p>
          </div>

          <form id="post-form">
            <div class="admin-field">
              <label class="admin-label" for="f-title">Title</label>
              <input type="text" id="f-title" class="admin-input" placeholder="Post title" />
            </div>
            <div class="admin-field">
              <label class="admin-label" for="f-slug">Slug <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#cbd5e1">(optional — auto-generated from title)</span></label>
              <input type="text" id="f-slug" class="admin-input" placeholder="my-post-slug" />
            </div>
            <div class="admin-field">
              <label class="admin-label" for="f-summary">Summary</label>
              <input type="text" id="f-summary" class="admin-input" placeholder="One-line summary shown on the blog index" />
            </div>
            <div class="admin-field">
              <label class="admin-label" for="f-tag">Tag <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#cbd5e1">(optional)</span></label>
              <input type="text" id="f-tag" class="admin-input" placeholder="e.g. AWS, Career, Building" />
            </div>
            <div class="admin-field">
              <label class="admin-label" for="f-content">Content</label>
              <textarea id="f-content" class="admin-textarea" placeholder="Full post content. Separate paragraphs with a blank line."></textarea>
            </div>
            <div class="admin-toggle-row">
              <input type="checkbox" id="f-published" />
              <label class="admin-toggle-label" for="f-published">Publish immediately</label>
            </div>
            <hr class="admin-divider" />
            <button type="submit" id="form-submit-btn" class="admin-btn admin-btn-full">Save Post</button>
            <p class="admin-msg" id="form-msg"></p>
          </form>
        </div>

        <!-- BUILDS LIST VIEW -->
        <div id="view-builds-list">
          <div class="admin-form-header" style="margin-bottom:20px">
            <button class="admin-back-btn" id="builds-back-to-hub-btn">← Admin</button>
            <p class="admin-form-title">Builds</p>
          </div>
          <div class="admin-list-header">
            <p class="admin-list-title" id="builds-list-count">Builds</p>
            <button class="admin-btn" id="new-build-btn">+ New Build</button>
          </div>
          <div id="builds-list-body"></div>
          <p class="admin-msg" id="builds-list-msg"></p>
        </div>

        <!-- BUILDS FORM VIEW -->
        <div id="view-builds-form">
          <div class="admin-form-header">
            <button class="admin-back-btn" id="builds-back-btn">← Back</button>
            <p class="admin-form-title" id="builds-form-mode-title">New Build</p>
          </div>

          <form id="builds-form">
            <div class="admin-field">
              <label class="admin-label" for="b-title">Title</label>
              <input type="text" id="b-title" class="admin-input" placeholder="Build title" />
            </div>
            <div class="admin-field">
              <label class="admin-label" for="b-description">Description <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#cbd5e1">(optional)</span></label>
              <textarea id="b-description" class="admin-textarea" style="min-height:80px" placeholder="Short description shown on the card"></textarea>
            </div>
            <div class="admin-field">
              <label class="admin-label" for="b-status">Status</label>
              <select id="b-status" class="admin-input">
                <option value="live">Live</option>
                <option value="wip">In Progress</option>
                <option value="idea">Idea</option>
              </select>
            </div>
            <div class="admin-field" id="b-progress-field" style="display:none">
              <label class="admin-label" for="b-progress">Progress <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#cbd5e1">(0–100)</span></label>
              <input type="number" id="b-progress" class="admin-input" min="0" max="100" placeholder="60" />
            </div>
            <div class="admin-field">
              <label class="admin-label" for="b-tags">Tags <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#cbd5e1">(optional, comma-separated)</span></label>
              <input type="text" id="b-tags" class="admin-input" placeholder="e.g. aws, js, canvas" />
            </div>
            <div class="admin-field">
              <label class="admin-label" for="b-link">Link URL <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#cbd5e1">(optional)</span></label>
              <input type="text" id="b-link" class="admin-input" placeholder="https://… or /path/" />
            </div>
            <div class="admin-field">
              <label class="admin-label" for="b-link-label">Link Label <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#cbd5e1">(optional)</span></label>
              <input type="text" id="b-link-label" class="admin-input" placeholder="View →" />
            </div>
            <div class="admin-field">
              <label class="admin-label" for="b-sort">Sort Order <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#cbd5e1">(lower = higher in column)</span></label>
              <input type="number" id="b-sort" class="admin-input" placeholder="0" value="0" />
            </div>
            <div class="admin-toggle-row">
              <input type="checkbox" id="b-dim" />
              <label class="admin-toggle-label" for="b-dim">Dim this card (muted visual style for archived items)</label>
            </div>
            <hr class="admin-divider" />
            <button type="submit" id="builds-form-submit-btn" class="admin-btn admin-btn-full">Save Build</button>
            <p class="admin-msg" id="builds-form-msg"></p>
          </form>
        </div>

      </div>
    </div>
  </main>

  <footer class="footer">
    <p><a href="https://zacksimon.dev" class="footer-brand">zacksimon.dev</a></p>
    <div class="footer-links" aria-label="Footer links">
      <a href="mailto:zacksimon13@gmail.com">Email</a>
      <a href="https://www.linkedin.com/in/zackary-simon" target="_blank" rel="noopener">LinkedIn</a>
      <a href="/resume.pdf" download>Resume</a>
      <a href="/work/">Builds</a>
      <a href="/privacy-terms/">Privacy &amp; Terms</a>
    </div>
  </footer>

  <script src="/assets/js/script.js"></script>
  <script src="/assets/js/admin.js"></script>
</body>
</html>
