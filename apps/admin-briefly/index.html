<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Briefly Admin</title>
  </head>
  <body>
    <main>
      <h1>Briefly Admin</h1>
      <p>Submit daily inputs, review drafts, and publish to The Build Log.</p>
      <form id="daily-input-form">
        <label>Input date <input name="input_date" type="date" required /></label>
        <label>Bullet 1 <input name="bullet_1" type="text" required /></label>
        <label>Bullet 2 <input name="bullet_2" type="text" required /></label>
        <label>Bullet 3 <input name="bullet_3" type="text" required /></label>
        <button type="submit">Submit</button>
      </form>
      <pre id="output" aria-live="polite"></pre>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
