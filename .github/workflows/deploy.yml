name: Deploy static site to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload site files to S3
        run: |
          aws s3 sync . s3://${S3_BUCKET_NAME} \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".DS_Store" \
            --exclude "lambda/*" \
            --exclude "apps/*" \
            --exclude "services/*" \
            --exclude "packages/*" \
            --exclude "infra/*" \
            --exclude "docs/*" \
            --exclude "node_modules/*" \
            --exclude "package.json" \
            --exclude "package-lock.json" \
            --exclude "tsconfig*.json" \
            --exclude "CLAUDE.md" \
            --exclude "memory/*"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${CLOUDFRONT_DISTRIBUTION_ID} \
            --paths "/*"

      - name: Run smoke test (with retries)
        env:
          SITE_URL: https://zacksimon.dev
          PUBLIC_API_BASE: https://33o1s2l689.execute-api.us-east-2.amazonaws.com
          WRITE_API_BASE: https://tblw8hlwu0.execute-api.us-east-2.amazonaws.com
        run: |
          for i in 1 2 3 4 5 6; do
            if ./scripts/smoke-test.sh; then
              exit 0
            fi
            echo "Smoke test attempt ${i} failed. Retrying in 20s..."
            sleep 20
          done
          echo "Smoke test failed after retries."
          exit 1
