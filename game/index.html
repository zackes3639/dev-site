<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Risk 256</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-wrapper">

    <header class="game-header">
      <div class="title-block">
        <h1 class="game-title">Risk 256</h1>
        <p class="game-sub">Reach <strong>256</strong> — avoid the bombs</p>
      </div>
      <div class="hud">
        <div class="hud-item">
          <span class="hud-label">Score</span>
          <span class="hud-value" id="score">0</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">Best</span>
          <span class="hud-value" id="best">0</span>
        </div>
        <button class="btn-restart" id="restart-btn">↺ Restart</button>
      </div>
    </header>

    <div class="grid-shell">
      <div id="grid" class="grid"></div>

      <div id="overlay" class="overlay hidden">
        <div class="overlay-card">
          <h2 id="end-title"></h2>
          <p id="end-msg"></p>
          <button class="btn-primary" id="play-again-btn">Play Again</button>
        </div>
      </div>
    </div>

    <footer class="game-footer">
      <div class="legend">
        <span class="leg leg-num">Numbers merge when equal</span>
        <span class="leg leg-bomb">💣 destroys tiles ≥ 64 · smaller tiles survive as 2</span>
        <span class="leg leg-immune">✦ freshly merged tiles immune for 1 move</span>
      </div>
      <p class="controls-note">Arrow keys &nbsp;·&nbsp; Swipe on mobile</p>
    </footer>

  </div>

  <script src="game.js"></script>
</body>
</html>
