<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Chain</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-wrapper">

    <header class="game-header">
      <div class="title-block">
        <h1 class="game-title">Color Chain</h1>
        <p class="game-sub">Connect <strong>3+</strong> tiles · 5-chain = 2× · 7-chain = 3×</p>
      </div>
      <div class="hud">
        <div class="hud-item">
          <span class="hud-label">Score</span>
          <span class="hud-value" id="score">0</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">Time</span>
          <span class="hud-value" id="timer">60</span>
        </div>
        <button class="btn-restart" id="restart-btn">↺ New</button>
      </div>
    </header>

    <div class="canvas-shell">
      <canvas id="game-canvas"></canvas>

      <div id="overlay" class="overlay hidden">
        <div class="overlay-card">
          <h2 id="end-title"></h2>
          <p id="end-msg"></p>
          <button class="btn-primary" id="play-again-btn">Play Again</button>
        </div>
      </div>
    </div>

    <footer class="game-footer">
      <div class="legend">
        <span class="leg">3+ tiles = 10 pts each</span>
        <span class="leg">5+ chain = 2× bonus</span>
        <span class="leg">7+ chain = 3× bonus</span>
      </div>
      <p class="controls-note">Click and drag to connect same-color tiles</p>
    </footer>

  </div>

  <script src="game.js"></script>
</body>
</html>
