<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unsubscribe | Zack Simon</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
  <style>
    .unsub-wrapper {
      min-height: calc(100vh - 120px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }
    .unsub-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: clamp(32px, 5vw, 56px);
      max-width: 480px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }
    .unsub-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: 700;
      margin: 0 auto 20px;
      background: #e5e7eb;
      color: #94a3b8;
    }
    .unsub-card .unsub-heading {
      font-size: clamp(0.92rem, 2.1vw, 1.4rem);
      font-weight: 700;
      color: #0b1220;
      margin: 0 auto 10px;
      max-width: 100%;
      white-space: nowrap;
      text-align: center;
      display: inline-block;
    }
    .unsub-subtext {
      font-size: clamp(0.75rem, 1.8vw, 0.9rem);
      color: #64748b;
      line-height: 1.6;
      margin: 0 0 6px;
      max-width: 36ch;
      white-space: normal;
      text-align: center;
      width: 100%;
    }
    .unsub-email {
      font-size: clamp(0.72rem, 1.6vw, 0.85rem);
      color: #94a3b8;
      margin: 0 0 28px;
      max-width: 36ch;
      white-space: normal;
      overflow-wrap: anywhere;
      text-align: center;
      width: 100%;
    }
    @media (max-width: 520px) {
      .unsub-card {
        padding: 24px 18px;
      }
      .unsub-card .unsub-heading {
        font-size: 0.84rem;
      }
    }
    .unsub-back {
      display: inline-block;
      margin-top: 16px;
      font-size: 0.85rem;
      color: #6c3fd4;
      text-decoration: none;
    }
    .unsub-back:hover {
      text-decoration: underline;
    }
    .unsub-compliance {
      display: none;
      font-size: 0.72rem;
      color: #cbd5e1;
      margin-top: 20px;
      text-align: center;
    }
    .unsub-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e5e7eb;
      border-top-color: #6c3fd4;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="nav-left">
      <a class="logo" href="/" aria-label="Go to home page">
        <img src="/assets/images/logo.svg" alt="Zack Simon logo" class="logo-image" />
      </a>
    </div>
    <div class="hotbar" role="navigation" aria-label="Primary navigation">
      <a class="hot-btn" href="/">About Me</a>
      <a class="hot-btn" href="/work/">Builds</a>
      <a class="hot-btn" href="/blog/">The Build Log</a>
      <a class="hot-btn" href="/contact/">Contact</a>
    </div>
    <div class="nav-contact"><a href="/admin.html" class="nav-admin">Admin</a></div>
  </header>

  <main>
    <div class="unsub-wrapper">
      <div class="unsub-card">
        <div class="unsub-spinner" id="unsub-spinner"></div>
        <div id="unsub-icon" class="unsub-icon" style="display:none;"></div>
        <h1 class="unsub-heading" id="unsub-heading">Unsubscribing…</h1>
        <p class="unsub-subtext" id="unsub-subtext">Removing you from email and SMS. Please wait.</p>
        <p class="unsub-email" id="unsub-email"></p>
        <a href="/" class="unsub-back">← Back to home</a>
        <p class="unsub-compliance" id="unsub-compliance">You have been removed from all email and SMS communications.</p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p><a href="https://zacksimon.dev" class="footer-brand">zacksimon.dev</a></p>
    <div class="footer-links" aria-label="Footer links">
      <a href="mailto:zacksimon13@gmail.com">Email</a>
      <a href="https://www.linkedin.com/in/zackary-simon" target="_blank" rel="noopener">LinkedIn</a>
      <a href="/resume.pdf" download>Resume</a>
      <a href="/work/">Builds</a>
      <a href="/privacy-terms/">Privacy &amp; Terms</a>
    </div>
  </footer>

  <script src="/assets/js/script.js"></script>
  <script src="/assets/js/unsubscribe.js"></script>
</body>
</html>
