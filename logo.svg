<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 150" width="150" height="150">
  <style>
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .arcs {
      animation: spin 7s linear infinite;
      transform-origin: 75px 75px;
    }
  </style>

  <!-- Background circle -->
  <circle cx="75" cy="75" r="70" fill="#6C3FD4"/>

  <!-- Spinning arcs -->
  <g class="arcs">
    <path d="M75 18 A57 57 0 0 1 132 75" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M75 132 A57 57 0 0 1 18 75"  fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <circle cx="75"  cy="18"  r="4.5" fill="white" opacity="0.85"/>
    <circle cx="75"  cy="132" r="4.5" fill="white" opacity="0.85"/>
  </g>

  <!-- ZS monogram -->
  <text
    x="75" y="92"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="46"
    font-weight="700"
    fill="white"
    text-anchor="middle"
    letter-spacing="-2">ZS</text>
</svg>
