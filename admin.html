<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | Zack Simon</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
  <style>
    .admin-wrapper {
      max-width: 680px;
      margin: 0 auto;
      padding: clamp(32px, 5vw, 64px) clamp(16px, 3.2vw, 32px);
    }
    .admin-eyebrow {
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6c3fd4;
      margin-bottom: 6px;
    }
    .admin-title {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700;
      color: #0b1220;
      margin: 0 0 32px;
    }
    .admin-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: clamp(24px, 4vw, 40px);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }
    .admin-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 20px;
    }
    .admin-label {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #94a3b8;
    }
    .admin-input {
      width: 100%;
      height: 44px;
      padding: 0 14px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #0b1220;
      background: #fafafa;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .admin-input:focus {
      outline: none;
      border-color: #6c3fd4;
      background: #ffffff;
    }
    .admin-textarea {
      width: 100%;
      min-height: 200px;
      padding: 12px 14px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #0b1220;
      background: #fafafa;
      box-sizing: border-box;
      resize: vertical;
      line-height: 1.6;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .admin-textarea:focus {
      outline: none;
      border-color: #6c3fd4;
      background: #ffffff;
    }
    .admin-toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .admin-toggle-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #6c3fd4;
      cursor: pointer;
      flex-shrink: 0;
    }
    .admin-toggle-label {
      font-size: 0.9rem;
      color: #475569;
      cursor: pointer;
    }
    .admin-divider {
      border: none;
      border-top: 1px solid #f1f5f9;
      margin: 0 0 24px;
    }
    .admin-submit {
      width: 100%;
      height: 48px;
      border: 1px solid #6c3fd4;
      border-radius: 8px;
      background: #ffffff;
      color: #0b1220;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 4px 12px rgba(108, 63, 212, 0.12);
    }
    .admin-submit:hover {
      background: #f6f2ff;
    }
    .admin-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .admin-msg {
      display: none;
      margin-top: 16px;
      font-size: 0.875rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="nav-left">
      <a class="logo" href="/" aria-label="Go to home page">
        <img src="/assets/images/logo.svg" alt="Zack Simon logo" class="logo-image" />
      </a>
    </div>
    <div class="hotbar" role="navigation" aria-label="Primary navigation">
      <a class="hot-btn" href="/">About Me</a>
      <a class="hot-btn" href="/work/">Builds</a>
      <a class="hot-btn hot-btn-active" href="/blog/">The Build Log</a>
      <a class="hot-btn" href="/contact/">Contact</a>
    </div>
    <div class="nav-contact"></div>
  </header>

  <main>
    <div class="admin-wrapper">
      <p class="admin-eyebrow">Admin</p>
      <h1 class="admin-title">New Blog Post</h1>

      <div class="admin-card">
        <form id="admin-form">
          <div class="admin-field">
            <label class="admin-label" for="admin-password">Admin Password</label>
            <input type="password" id="admin-password" class="admin-input" placeholder="Enter password" autocomplete="current-password" />
          </div>

          <hr class="admin-divider" />

          <div class="admin-field">
            <label class="admin-label" for="post-title">Title</label>
            <input type="text" id="post-title" class="admin-input" placeholder="Post title" />
          </div>

          <div class="admin-field">
            <label class="admin-label" for="post-summary">Summary</label>
            <input type="text" id="post-summary" class="admin-input" placeholder="One-line summary shown on the blog index" />
          </div>

          <div class="admin-field">
            <label class="admin-label" for="post-content">Content</label>
            <textarea id="post-content" class="admin-textarea" placeholder="Full post content. Separate paragraphs with a blank line."></textarea>
          </div>

          <div class="admin-toggle-row">
            <input type="checkbox" id="post-published" />
            <label class="admin-toggle-label" for="post-published">Publish immediately</label>
          </div>

          <button type="submit" id="admin-submit" class="admin-submit">Publish Post</button>
          <p class="admin-msg" id="admin-msg"></p>
        </form>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p><a href="https://zacksimon.dev" class="footer-brand">zacksimon.dev</a></p>
    <div class="footer-links" aria-label="Footer links">
      <a href="mailto:zacksimon13@gmail.com">Email</a>
      <a href="https://www.linkedin.com/in/zackary-simon" target="_blank" rel="noopener">LinkedIn</a>
      <a href="/resume.pdf" download>Resume</a>
      <a href="/work/">Builds</a>
      <a href="/privacy-terms/">Privacy &amp; Terms</a>
    </div>
  </footer>

  <script src="/assets/js/script.js"></script>
  <script src="/assets/js/admin.js"></script>
</body>
</html>
